<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1254 1254" role="img" aria-labelledby="title desc">
  <title id="title">Apex Ray logo</title>
  <desc id="desc">A minimal isometric apex mark with a cyan inspection ray.</desc>
  <defs>
    <linearGradient id="darkFace" x1="600" y1="390" x2="820" y2="780" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#222a2f"/>
      <stop offset="1" stop-color="#172024"/>
    </linearGradient>
    <linearGradient id="baseLeft" x1="360" y1="750" x2="620" y2="945" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#242c31"/>
      <stop offset="1" stop-color="#151d21"/>
    </linearGradient>
    <linearGradient id="baseRight" x1="640" y1="900" x2="900" y2="740" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#141c20"/>
      <stop offset="1" stop-color="#263036"/>
    </linearGradient>
    <linearGradient id="ray" x1="642" y1="398" x2="1100" y2="295" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#12bde9"/>
      <stop offset=".45" stop-color="#08aee5"/>
      <stop offset="1" stop-color="#05a8df"/>
    </linearGradient>
    <filter id="softBaseShadow" x="-20%" y="-20%" width="140%" height="160%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="22" stdDeviation="26" flood-color="#11191d" flood-opacity=".12"/>
    </filter>
  </defs>
  <g filter="url(#softBaseShadow)">
    <path d="M333 730 621 902 910 730 910 790 621 962 333 790Z" fill="#172024"/>
    <path d="M333 730 621 902 621 962 333 790Z" fill="url(#baseLeft)"/>
    <path d="M621 902 910 730 910 790 621 962Z" fill="url(#baseRight)"/>
  </g>

  <path d="M620 384 871 718 621 862Z" fill="url(#darkFace)"/>
  <path d="M620 384 377 718 621 862Z" fill="#fbfbfa" stroke="#151a1d" stroke-width="2.4" stroke-linejoin="round"/>
  <path d="M620 384 621 862" fill="none" stroke="#151a1d" stroke-width="2.2" stroke-linecap="round"/>
  <path d="M621 862 871 718" fill="none" stroke="#151a1d" stroke-width="2.2" stroke-linecap="round"/>

  <path d="M642 398 1100 295 668 438Z" fill="url(#ray)"/>
</svg>
