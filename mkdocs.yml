site_name: Apex Ray
site_description: Local CLI-first AI code review for TypeScript, JavaScript, and Python projects.
site_url: https://dobrotacreator.github.io/apex-ray/
repo_url: https://github.com/dobrotacreator/apex-ray
repo_name: dobrotacreator/apex-ray
edit_uri: edit/main/docs/

theme:
  name: material
  logo: assets/apex-ray-logo.svg
  favicon: assets/apex-ray-logo.svg
  language: en
  features:
    - content.action.edit
    - content.action.view
    - content.code.copy
    - navigation.footer
    - navigation.instant
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest
    - toc.follow
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: black
      accent: cyan
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: cyan
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences

nav:
  - Overview: index.md
  - Getting Started:
      - Quick Start: quickstart.md
      - Review Workflow: review-workflow.md
      - Configuration: configuration.md
      - LLM Providers: providers.md
  - Project Knowledge:
      - Rules And Memory: memory.md
      - Telemetry: telemetry.md
  - Quality:
      - Historical PR Evals: pr-eval.md
  - Internals:
      - Architecture: architecture.md
      - Development: development.md
