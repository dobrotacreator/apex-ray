name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

# CI opts into the upcoming GitHub Actions Node 24 runtime early so third-party
# JavaScript actions break here before GitHub changes the default runner runtime.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: analyzer-runtimes/typescript/package-lock.json

      - uses: astral-sh/setup-uv@v7

      - name: Install TypeScript analyzer dependencies
        working-directory: analyzer-runtimes/typescript
        run: npm ci

      - name: Typecheck TypeScript analyzer
        working-directory: analyzer-runtimes/typescript
        run: npm run typecheck

      - name: Test TypeScript analyzer
        working-directory: analyzer-runtimes/typescript
        run: npm test

      - name: Measure TypeScript analyzer coverage
        working-directory: analyzer-runtimes/typescript
        run: npm run coverage

      - name: Install Python dependencies
        run: uv sync --locked --all-groups

      - name: Check Python formatting
        run: uv run ruff format --check .

      - name: Lint Python
        run: uv run ruff check .

      - name: Typecheck Python
        run: uv run pyright

      - name: Run Python tests with coverage
        run: |
          uv run coverage run -m pytest -q
          uv run coverage report -m

      - name: Build package
        run: uv build --sdist --wheel

      - name: Check package metadata
        run: uv run twine check dist/*

      - name: Smoke test installed wheel
        run: |
          wheel="$(find dist -maxdepth 1 -name '*.whl' -print -quit)"
          uv venv .ci-smoke-venv
          uv pip install --python .ci-smoke-venv/bin/python "$wheel"
          .ci-smoke-venv/bin/apex-ray --version
          tmpdir="$(mktemp -d)"
          doctor_output="$(cd "$tmpdir" && "$GITHUB_WORKSPACE/.ci-smoke-venv/bin/apex-ray" doctor)"
          echo "$doctor_output"
          grep -q "Python analyzer available: true" <<<"$doctor_output"
          grep -q "TypeScript analyzer built: true" <<<"$doctor_output"
          ts_reviewdir="$(mktemp -d)"
          cd "$ts_reviewdir"
          git init
          git config user.email "apex@example.test"
          git config user.name "Apex Test"
          mkdir -p src
          printf '{"compilerOptions":{"target":"ES2022"},"include":["src/**/*.ts"]}\n' > tsconfig.json
          printf 'export function total(price: number, quantity: number): number {\n  return price * quantity;\n}\n' > src/cart.ts
          git add .
          git commit -m "initial"
          printf 'export function total(price: number, quantity: number): number {\n  return price;\n}\n' > src/cart.ts
          "$GITHUB_WORKSPACE/.ci-smoke-venv/bin/apex-ray" review --worktree --no-llm --output review.md --json review.json
          test -s review.md
          test -s review.json
          "$GITHUB_WORKSPACE/.ci-smoke-venv/bin/python" - <<'PY'
          import json
          from pathlib import Path

          report = json.loads(Path("review.json").read_text(encoding="utf-8"))
          assert report["analyzer_results"], "expected bundled TypeScript analyzer results"
          warnings = "\n".join(
              warning
              for analyzer_result in report["analyzer_results"]
              for warning in analyzer_result.get("warnings", [])
          )
          assert "TypeScript analyzer unavailable" not in warnings
          assert any(
              symbol.get("changed_symbols")
              for analyzer_result in report["analyzer_results"]
              for symbol in analyzer_result.get("files", [])
          ), "expected changed symbols from bundled TypeScript analyzer"
          PY
          py_reviewdir="$(mktemp -d)"
          cd "$py_reviewdir"
          git init
          git config user.email "apex@example.test"
          git config user.name "Apex Test"
          mkdir -p src
          cat > src/adapter.py <<'PYCODE'
          class ResourceClient:
              def __init__(self, client):
                  self._client = client

              async def send_resource(self, payload):
                  response = await self._client.post("/resources", json=payload)
                  return response
          PYCODE
          git add .
          git commit -m "initial"
          cat > src/adapter.py <<'PYCODE'
          class ResourceClient:
              def __init__(self, client):
                  self._client = client

              async def send_resource(self, payload):
                  response = await self._client.post("/resources", json=payload, timeout=5.0)
                  return response
          PYCODE
          "$GITHUB_WORKSPACE/.ci-smoke-venv/bin/apex-ray" review --worktree --no-llm --output python-review.md --json python-review.json
          test -s python-review.md
          test -s python-review.json
          "$GITHUB_WORKSPACE/.ci-smoke-venv/bin/python" - <<'PY'
          import json
          from pathlib import Path

          report = json.loads(Path("python-review.json").read_text(encoding="utf-8"))
          python_results = [
              analyzer_result
              for analyzer_result in report["analyzer_results"]
              if analyzer_result.get("language") == "python"
          ]
          assert python_results, "expected Python analyzer results"
          warnings = "\n".join(
              warning
              for analyzer_result in python_results
              for warning in analyzer_result.get("warnings", [])
          )
          assert "Python analyzer failed" not in warnings
          assert any(
              symbol.get("changed_symbols")
              for analyzer_result in python_results
              for symbol in analyzer_result.get("files", [])
          ), "expected changed symbols from Python analyzer"
          assert any(
              "external I/O call" in metadata.get("text", "")
              for pack in report["context_packs"]
              for metadata in pack.get("metadata", [])
          ), "expected Python boundary metadata in context pack"
          PY
          go_reviewdir="$(mktemp -d)"
          cd "$go_reviewdir"
          git init
          git config user.email "apex@example.test"
          git config user.name "Apex Test"
          mkdir -p internal/auth internal/api
          cat > go.mod <<'GOMOD'
          module example.com/review

          go 1.24
          GOMOD
          cat > internal/auth/service.go <<'GOCODE'
          package auth

          import (
              "context"
              "fmt"
          )

          type Repository interface {
              Save(context.Context, string) error
          }

          type Service struct {
              repo Repository
          }

          func (s *Service) Authorize(ctx context.Context, id string) error {
              if err := s.repo.Save(ctx, id); err != nil {
                  return fmt.Errorf("save auth: %w", err)
              }
              return nil
          }
          GOCODE
          cat > internal/api/handler.go <<'GOCODE'
          package api

          import (
              "net/http"

              "example.com/review/internal/auth"
          )

          func Register(mux *http.ServeMux, svc *auth.Service) {
              mux.HandleFunc("/resource", func(w http.ResponseWriter, r *http.Request) {
                  _ = svc.Authorize(r.Context(), "resource-id")
              })
          }
          GOCODE
          git add .
          git commit -m "initial"
          perl -0pi -e 's/return nil/return fmt.Errorf("unauthorized: %w", context.Canceled)/' internal/auth/service.go
          "$GITHUB_WORKSPACE/.ci-smoke-venv/bin/python" - <<'PY'
          from apex_ray.analyzers import go_analyzer_runtime_dir

          runtime = go_analyzer_runtime_dir()
          assert runtime.name == "go", runtime
          assert runtime.parent.name == "_bundled", runtime
          assert (runtime / "go.mod").exists(), runtime
          PY
          "$GITHUB_WORKSPACE/.ci-smoke-venv/bin/apex-ray" review --worktree --no-llm --output go-review.md --json go-review.json
          test -s go-review.md
          test -s go-review.json
          "$GITHUB_WORKSPACE/.ci-smoke-venv/bin/python" - <<'PY'
          import json
          from pathlib import Path

          report = json.loads(Path("go-review.json").read_text(encoding="utf-8"))
          go_results = [
              analyzer_result
              for analyzer_result in report["analyzer_results"]
              if analyzer_result.get("language") == "go"
          ]
          assert go_results, "expected Go analyzer results from installed wheel"
          warnings = "\n".join(
              warning
              for analyzer_result in go_results
              for warning in analyzer_result.get("warnings", [])
          )
          assert "Go analyzer unavailable" not in warnings
          assert any(
              symbol.get("changedSymbols") or symbol.get("changed_symbols")
              for analyzer_result in go_results
              for symbol in analyzer_result.get("files", [])
          ), "expected changed symbols from bundled Go analyzer"
          assert any(
              reference.get("file") == "internal/api/handler.go"
              for pack in report["context_packs"]
              for reference in pack.get("references", [])
          ), "expected typed Go reference in context pack"
          assert any(
              "error wrapping" in metadata.get("text", "")
              for pack in report["context_packs"]
              for metadata in pack.get("metadata", [])
          ), "expected Go boundary metadata in context pack"
          PY
