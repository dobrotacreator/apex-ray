name: Bug report
description: Report a reproducible Apex Ray problem.
title: "bug: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Include commands, config shape, and a minimal diff if possible.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Apex Ray version
      placeholder: "0.1.0 or commit SHA"
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Python, Node, LLM provider, and whether LLM review was enabled.
  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Remove private code, credentials, and sensitive telemetry.
      render: text
