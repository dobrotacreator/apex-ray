no_tty: true

pre-commit:
  parallel: true
  commands:
    ruff-format:
      glob: "**/*.py"
      run: uv run ruff format --check {staged_files}
    ruff-check:
      glob: "**/*.py"
      run: uv run ruff check {staged_files}
    whitespace:
      run: git diff --cached --check

commit-msg:
  commands:
    conventional:
      run: 'head -n 1 "{1}" | grep -qE "^(feat|fix|refactor|test|docs|infra|adr|migration|chore)(\([^)]+\))?!?: .+" || (echo "Commit message must follow conventional format: type(scope): description" && exit 1)'

pre-push:
  follow: true
  parallel: false
  commands:
    ruff-format:
      run: uv run ruff format --check .
    ruff-check:
      run: uv run ruff check .
    pyright:
      run: uv run pyright
    ts-analyzer:
      run: npm --prefix analyzer-runtimes/typescript run typecheck && npm --prefix analyzer-runtimes/typescript run coverage
    python-coverage:
      run: uv run coverage run -m pytest -q && uv run coverage report -m
    package:
      run: uv build --sdist --wheel && uv run twine check dist/*
    apex-ray-review:
      run: bash scripts/apex-ray-pre-push.sh
